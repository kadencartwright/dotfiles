center = ["clock"]
right = [
  "custom-codexbar",
  "media",
  "systray",
  "network",
  "custom-power-profile",
  "custom-battery",
  "volume",
  "dashboard",
]

[styling]
scale = 1.0
rounding = "sm"
theme-provider = "wayle"
theming-monitor = ""
matugen-scheme = "tonal-spot"
matugen-contrast = 0.0
matugen-source-color = 0
matugen-light = false
wallust-palette = "dark16"
wallust-saturation = 0
wallust-check-contrast = true
wallust-backend = "fastresize"
wallust-colorspace = "labmixed"
wallust-apply-globally = true
pywal-saturation = 0.05
pywal-contrast = 3.0
pywal-light = false
pywal-apply-globally = true

[styling.palette]
bg = "#1f2329"
surface = "#252a31"
elevated = "#2b313a"
fg = "#a0a8b7"
fg-muted = "#7a818e"
primary = "#4fa6ed"
red = "#e55561"
yellow = "#cc9057"
green = "#8ebd6b"
blue = "#48b0bd"

[modules]

[[modules.custom]]
id = "codexbar"
command = '''
codexbar \
  --format '{session_pct}% - {session_reset}' \
  --tooltip-format 'Session: {session_pct}% ({session_pace_pts})
Weekly: {weekly_pct}% ({weekly_pace_pts})
Session reset: {session_reset}
Weekly reset: {weekly_reset}' |
  jq -c '(.text,.tooltip) |= gsub("<[^>]*>"; "")'
'''
mode = "poll"
interval-ms = 300000
format = "{{ text }}"
tooltip-format = "{{ tooltip }}"
icon-name = "ld-code-symbolic"
border-show = false
border-color = "green"
icon-show = true
icon-color = "auto"
icon-bg-color = "green"
label-show = true
label-color = "green"
label-max-length = 0
button-bg-color = "bg-surface-elevated"
left-click = "/home/k/code/dotfiles/wayle/scripts/codexbar-panel"
right-click = "xdg-open https://chatgpt.com/codex/settings/usage"
middle-click = ""
scroll-up = ""
scroll-down = ""

[[modules.custom]]
id = "power-profile"
command = '''
profile=$(powerprofilesctl get 2>/dev/null || echo unknown)
case "$profile" in
  performance) text="Perf" ;;
  balanced) text="Balanced" ;;
  power-saver) text="Saver" ;;
  *) text="N/A" ;;
esac
printf '{"text":"%s","alt":"%s","tooltip":"Power profile: %s"}\n' "$text" "$profile" "$profile"
'''
mode = "poll"
interval-ms = 500
format = "{{ text }}"
tooltip-format = "Power profile: {{ alt }}"
icon-name = "ld-power-symbolic"
border-show = false
border-color = "border-accent"
icon-show = true
icon-color = "auto"
icon-bg-color = "fg-muted"
label-show = true
label-color = "fg-muted"
label-max-length = 0
button-bg-color = "bg-surface-elevated"
left-click = "wayle power cycle"
right-click = "wayle power set power-saver"
middle-click = "wayle power set balanced"
scroll-up = "wayle power set performance"
scroll-down = "wayle power set power-saver"
on-action = '''
sleep 0.15
profile=$(powerprofilesctl get 2>/dev/null || echo unknown)
case "$profile" in
  performance) text="Perf" ;;
  balanced) text="Balanced" ;;
  power-saver) text="Saver" ;;
  *) text="N/A" ;;
esac
printf '{"text":"%s","alt":"%s","tooltip":"Power profile: %s"}\n' "$text" "$profile" "$profile"
'''

[[modules.custom]]
id = "battery"
command = '''
cap=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null) || exit 0
status=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null || true)
alt=$(printf '%s' "$status" | tr '[:upper:]' '[:lower:]')
printf '{"percentage":%s,"alt":"%s","tooltip":"Battery: %s%% (%s)"}\n' "$cap" "$alt" "$cap" "$status"
'''
mode = "poll"
interval-ms = 10000
format = "{{ percentage }}%"
tooltip-format = "Battery: {{ percentage }}%"
icon-names = [
  "md-battery_android_0-symbolic",
  "md-battery_android_frame_1-symbolic",
  "md-battery_android_frame_2-symbolic",
  "md-battery_android_frame_3-symbolic",
  "md-battery_android_frame_4-symbolic",
  "md-battery_android_frame_5-symbolic",
  "md-battery_android_frame_6-symbolic",
  "md-battery_android_frame_full-symbolic",
]
border-show = false
border-color = "green"
icon-show = true
icon-color = "auto"
icon-bg-color = "green"
label-show = true
label-color = "green"
label-max-length = 0
button-bg-color = "bg-surface-elevated"
left-click = ""
right-click = ""
middle-click = ""
scroll-up = ""
scroll-down = ""

