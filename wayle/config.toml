location = "top"
exclusive = true
layer = "top"
bg = "bg-surface"
background-opacity = 96
border-location = "none"
border-width = 1
border-color = "border-accent"
rounding = "sm"
shadow = "none"
button-variant = "block-prefix"
button-opacity = 100
button-bg-opacity = 100
button-icon-size = 1.0
button-icon-padding = 0.8
button-label-size = 1.0
